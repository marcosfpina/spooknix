# docker-compose.yml
services:
  spooknix:
    build:
      context: .
      network: host   # resolve DNS do apt-get no NixOS
    image: spooknix:latest

    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=0
              capabilities: [ gpu ]

    ports:
      - "8000:8000"

    shm_size: '256m'

    ulimits:
      memlock: -1
      stack: 67108864

    volumes:
      - ./outputs:/app/outputs
      - ./src:/app/src:ro                          # hot-reload do código
      - ./outputs/interviews:/app/outputs/interviews
      - ./outputs/summaries:/app/outputs/summaries  
      - hf_cache:/root/.cache/huggingface          # modelos persistem entre restarts
      - /var/lib/ml-models/huggingface/hub:/root/.cache/huggingface/hub  # reaproveita modelos do sistema
      - cuda_cache:/root/.cuda_cache               # cache de kernels CUDA compilados

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3


    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_SIZE=large-v3                        # use large-v3-turbo p/ ~8× speedup
      - DEVICE=cuda
      - COMPUTE_TYPE=int8_float16
      - ENABLE_DIARIZATION=false
      - HF_TOKEN=${HF_TOKEN:-}   # exportado pelo shellHook via SOPS
      - HF_HOME=/root/.cache/huggingface
      # CUDA performance
      - CUDA_CACHE_DISABLE=0
      - CUDA_CACHE_PATH=/root/.cuda_cache
      - CUDA_MODULE_LOADING=LAZY
      - OMP_NUM_THREADS=4
      - MALLOC_TRIM_THRESHOLD_=100000

    restart: unless-stopped

volumes:
  hf_cache:      # cache persistente dos modelos HuggingFace
  cuda_cache:    # cache de kernels CUDA JIT (evita recompilação a cada restart)
