name: Dependency Maintenance

on:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependency-maintenance
  cancel-in-progress: false

jobs:
  update-flake-lock:
    name: Refresh flake.lock
    runs-on: [self-hosted, nixos]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: cachix/install-nix-action@8887e596b4ee1134dae06b98d573bd674693f47c # v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true

      - if: ${{ secrets.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: voidnxlabs
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update flake.lock
        run: nix flake update

      - name: Re-run Nix surface checks
        run: nix flake check --show-trace

      - name: Re-run core tests
        run: nix develop --command pytest -q

      - name: Open maintenance PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-flake-lock
          base: ${{ github.event.repository.default_branch }}
          commit-message: "chore(nix): update flake.lock"
          title: "chore(nix): update flake.lock"
          body: |
            Automated refresh of `flake.lock`.

            Validation executed before opening this PR:
            - `nix flake check --show-trace`
            - `nix develop --command pytest -q`
          delete-branch: true
