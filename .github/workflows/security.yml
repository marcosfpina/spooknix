name: Security Scanning

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "20 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scanning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret leak detection
    runs-on: [self-hosted, nixos]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  workflow-hygiene:
    name: Workflow hygiene
    runs-on: [self-hosted, nixos]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Actionlint
        uses: rhysd/actionlint@v1

  semgrep:
    name: Semgrep
    runs-on: [self-hosted, nixos]
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/secrets
            p/supply-chain
          generateSarif: "1"

      - name: Upload Semgrep SARIF
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  codeql:
    name: CodeQL
    runs-on: [self-hosted, nixos]
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
