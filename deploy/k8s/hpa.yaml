apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spooknix
  labels:
    app: spooknix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spooknix
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Pods
      pods:
        metric:
          name: spooknix_active_sessions
        target:
          type: AverageValue
          averageValue: "5"
