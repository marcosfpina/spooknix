apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spooknix.fullname" . }}
  labels:
    app: {{ include "spooknix.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "spooknix.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "spooknix.name" . }}
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: spooknix
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.hfTokenSecretName }}
                  key: {{ .Values.secrets.hfTokenKey }}
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: hf-cache
              mountPath: {{ .Values.persistence.mountPath }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: {{ include "spooknix.fullname" . }}-hf-cache
---
{{- define "spooknix.name" -}}
{{- .Chart.Name | trunc 63 | trimSuffix "-" }}
{{- end }}
{{- define "spooknix.fullname" -}}
{{- printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" }}
{{- end }}
